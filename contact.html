  <main>
    <!-- HERO -->
    <section class="hero contact-hero">
      <div class="hero__bg" style="background-image: url('assets/images/hero-about.jpg');"></div>
      <div class="hero__overlay"></div>
      <div class="hero__content">
        <h1 class="hero__title">Contact Us</h1>
      </div>
    </section>

    <!-- CONTACT SECTION -->
    <section class="section contact-section">
      <div class="container">
        <h2 class="contact-intro">Start Your Journey</h2>

        <form class="contact-form" id="contactForm" action="https://formspree.io/f/xeewylep" method="POST">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="firstName">First Name</label>
              <input class="form-input" type="text" id="firstName" name="firstName" autocomplete="given-name">
            </div>
            <div class="form-group">
              <label class="form-label" for="lastName">Last Name</label>
              <input class="form-input" type="text" id="lastName" name="lastName" autocomplete="family-name">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="phone">Phone Number <span class="form-label__note">(optional)</span></label>
            <input class="form-input" type="tel" id="phone" name="phone" autocomplete="tel">
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Email Address* <span class="form-label__note">(required)</span></label>
            <input class="form-input" type="email" id="email" name="email" placeholder="Johndoe@gmail.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label" for="subject">Subject - Project Title* <span class="form-label__note">(required)</span></label>
            <input class="form-input" type="text" id="subject" name="subject" placeholder="Type Here" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="message">Describe your Project Idea* <span class="form-label__note">(required)</span></label>
            <textarea class="form-textarea" id="message" name="message" placeholder="Type Here" required></textarea>
          </div>
          <button type="submit" class="form-submit">Submit</button>
        </form>

        <div class="form-success" id="formSuccess">
          Thank you! Someone will respond to your inquiry shortly.
        </div>
      </div>
    </section>
  </main>
