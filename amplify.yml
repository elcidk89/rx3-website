version: 1
frontend:
  phases:
    build:
      commands: []
  artifacts:
    baseDirectory: /
    files:
      - '**/*'
  cache:
    paths: []
hosting:
  redirectRules:
    - source: /about-1
      target: /about.html
      status: '301'
    - source: /our-process
      target: /our-process.html
      status: '301'
    - source: /gallery
      target: /gallery.html
      status: '301'
    - source: /contact
      target: /contact.html
      status: '301'
    - source: /privacy
      target: /privacy.html
      status: '301'
